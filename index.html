<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resume</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .skills-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 20px 0;
        }
        .skill-card {
            background: linear-gradient(145deg, #e6e6e6, #ffffff);
            border-radius: 10px;
            box-shadow: 5px 5px 15px #a6a6a6,
                        -5px -5px 15px #ffffff;
            padding: 20px;
            margin: 10px;
            flex: 1 1 calc(30% - 20px);
            transition: transform 0.3s;
            position: relative;
        }
        .skill-card:hover {
            transform: scale(1.05);
        }
        .progress-bar {
            background-color: #f3f3f3;
            border-radius: 25px;
            overflow: hidden;
            height: 20px;
            width: 100%;
            margin-top: 10px;
            box-shadow: inset 3px 3px 5px rgba(255, 255, 255, 0.6);
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            border-radius: 25px;
            animation: progress-animation 2s ease-in-out;
        }
        @keyframes progress-animation {
            from { width: 0%; }
            to { width: var(--progress-value); }
        }
    </style>
</head>
<body>
    <div class="skills-section">
        <div class="skill-card">
            <h3>JavaScript</h3>
            <div class="progress-bar">
                <div class="progress" style="--progress-value: 80%; width: 80%;"></div>
            </div>
        </div>
        <div class="skill-card">
            <h3>HTML & CSS</h3>
            <div class="progress-bar">
                <div class="progress" style="--progress-value: 90%; width: 90%;"></div>
            </div>
        </div>
        <div class="skill-card">
            <h3>React</h3>
            <div class="progress-bar">
                <div class="progress" style="--progress-value: 75%; width: 75%;"></div>
            </div>
        </div>
        <div class="skill-card">
            <h3>Node.js</h3>
            <div class="progress-bar">
                <div class="progress" style="--progress-value: 70%; width: 70%;"></div>
            </div>
        </div>
    </div>
</body>
</html>
